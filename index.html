<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Schedule</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
      background: var(--tg-theme-bg-color, #000);
      color: var(--tg-theme-text-color, #E8E8E8);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
    }

    .header {
      margin-bottom: 20px;
    }

    .agent-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--tg-theme-hint-color, #666);
      margin-bottom: 6px;
    }

    .question {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--tg-theme-text-color, #E8E8E8);
    }

    .week-label {
      font-size: 13px;
      color: var(--tg-theme-hint-color, #888);
      margin-top: 4px;
    }

    .days-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .day-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-radius: 12px;
      border: none;
      background: var(--tg-theme-secondary-bg-color, #1E1E1E);
      color: var(--tg-theme-text-color, #E8E8E8);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .day-btn.selected {
      background: var(--tg-theme-button-color, #3A7D5C);
      color: var(--tg-theme-button-text-color, #fff);
    }

    .day-btn .day-name {
      font-size: 16px;
    }

    .day-btn .day-date {
      font-size: 14px;
      opacity: 0.7;
    }

    .day-btn .check {
      font-size: 20px;
      flex-shrink: 0;
      margin-left: 8px;
      transition: transform 0.1s ease;
    }

    .day-btn.selected .check {
      transform: scale(1.1);
    }

    .submit-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      background: var(--tg-theme-bg-color, #000);
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--tg-theme-button-color, #3A7D5C);
      color: var(--tg-theme-button-text-color, #fff);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .submit-btn:active { opacity: 0.85; }

    .selection-count {
      text-align: center;
      font-size: 12px;
      color: var(--tg-theme-hint-color, #666);
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="agent-label" id="agent-label">Nightingale</div>
  <div class="question" id="question">Which days are you working?</div>
  <div class="week-label" id="week-label">Week of Apr 7</div>
</div>

<div class="days-grid" id="days-grid"></div>

<div class="submit-bar">
  <div class="selection-count" id="selection-count">Tap to select days</div>
  <button class="submit-btn" id="submit-btn" onclick="handleDone()">Done</button>
</div>

<script>
  // Parse URL params
  const params = new URLSearchParams(window.location.search);
  const member = params.get('member') || 'cindy';
  const weekOf = params.get('week_of') || getNextMonday();
  const agent = params.get('agent') || 'nightingale';
  const dataField = params.get('data_field') || 'working';
  const question = params.get('question') || 'Which days are you working?';
  const confirmVerb = params.get('confirm_verb') || 'working';

  const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
  const SHORT = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  let selected = [false, false, false, false, false];

  function getNextMonday() {
    const today = new Date();
    const day = today.getDay();
    const daysUntilMonday = day === 0 ? 1 : 8 - day;
    const monday = new Date(today);
    monday.setDate(today.getDate() + daysUntilMonday);
    return monday.toISOString().split('T')[0];
  }

  function getDates() {
    const monday = new Date(weekOf + 'T00:00:00');
    return Array.from({length: 5}, (_, i) => {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      return d;
    });
  }

  function formatDate(d) {
    return `${MONTHS[d.getMonth()]} ${d.getDate()}`;
  }

  function init() {
    // Telegram WebApp setup
    if (window.Telegram && Telegram.WebApp) {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
    }

    const dates = getDates();

    // Header
    document.getElementById('agent-label').textContent =
      agent.charAt(0).toUpperCase() + agent.slice(1);
    document.getElementById('question').textContent = decodeURIComponent(question);
    document.getElementById('week-label').textContent =
      `Week of ${formatDate(dates[0])} – ${formatDate(dates[4])}`;

    // Build day buttons
    const grid = document.getElementById('days-grid');
    DAYS.forEach((day, i) => {
      const btn = document.createElement('button');
      btn.className = 'day-btn';
      btn.id = `day-${i}`;
      btn.onclick = () => toggleDay(i);
      btn.innerHTML = `
        <div>
          <span class="day-name">${day}</span>
          <span class="day-date"> · ${formatDate(dates[i])}</span>
        </div>
        <span class="check" id="check-${i}">⬜</span>
      `;
      grid.appendChild(btn);
    });

    updateCount();
  }

  function toggleDay(i) {
    selected[i] = !selected[i];
    const btn = document.getElementById(`day-${i}`);
    const check = document.getElementById(`check-${i}`);
    btn.classList.toggle('selected', selected[i]);
    check.textContent = selected[i] ? '✅' : '⬜';

    // Haptic feedback
    if (window.Telegram && Telegram.WebApp && Telegram.WebApp.HapticFeedback) {
      Telegram.WebApp.HapticFeedback.impactOccurred('light');
    }

    updateCount();
  }

  function updateCount() {
    const count = selected.filter(Boolean).length;
    const el = document.getElementById('selection-count');
    if (count === 0) {
      el.textContent = 'Tap to select days';
    } else if (count === 5) {
      el.textContent = 'All 5 days selected';
    } else {
      el.textContent = `${count} day${count > 1 ? 's' : ''} selected`;
    }
  }

  function handleDone() {
    const dates = getDates();
    const days = {};
    DAYS.forEach((day, i) => {
      days[day.toLowerCase()] = {
        date: dates[i].toISOString().split('T')[0],
        [dataField]: selected[i]
      };
    });

    const payload = {
      member,
      agent,
      week_of: weekOf,
      data_field: dataField,
      confirm_verb: confirmVerb,
      days
    };

    const json = JSON.stringify(payload);

    try {
      if (window.Telegram && window.Telegram.WebApp && typeof window.Telegram.WebApp.sendData === 'function') {
        window.Telegram.WebApp.sendData(json);
      } else {
        // Fallback: show the data (outside Telegram context)
        document.getElementById('submit-btn').textContent = 'Sent! ✅';
        document.getElementById('submit-btn').disabled = true;
        const pre = document.createElement('pre');
        pre.style.cssText = 'margin:16px;font-size:11px;color:#888;word-break:break-all;white-space:pre-wrap;';
        pre.textContent = 'DEBUG (not in Telegram):\n' + JSON.stringify(payload, null, 2);
        document.body.appendChild(pre);
      }
    } catch(e) {
      document.getElementById('submit-btn').textContent = 'Error: ' + e.message;
    }
  }

  init();
</script>
</body>
</html>
