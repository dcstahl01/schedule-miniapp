<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  body { background: #111; color: #eee; font-family: system-ui; padding: 20px; }
  button { display: block; width: 100%; padding: 16px; margin: 8px 0; border: none;
    border-radius: 12px; font-size: 16px; cursor: pointer; }
  #status { font-size: 13px; color: #888; margin: 12px 0; min-height: 40px; }
</style>
</head>
<body>
<h2>sendData() Test</h2>
<div id="status">Tap a button...</div>
<button style="background:#3A7D5C;color:#fff" onclick="testSend()">Send Test Data</button>
<button style="background:#333;color:#eee" onclick="testClose()">Just Close</button>
<button style="background:#555;color:#eee" onclick="showInfo()">Show TG Info</button>

<script>
function showInfo() {
  var tg = window.Telegram && window.Telegram.WebApp;
  if (!tg) { document.getElementById('status').textContent = 'Telegram.WebApp not found'; return; }
  document.getElementById('status').textContent =
    'version: ' + tg.version +
    ' | initData len: ' + (tg.initData || '').length +
    ' | platform: ' + tg.platform;
}

function testSend() {
  var btn = document.getElementById('status');
  btn.textContent = 'Attempting sendData...';
  try {
    if (!window.Telegram || !window.Telegram.WebApp) {
      btn.textContent = 'ERROR: No Telegram.WebApp';
      return;
    }
    Telegram.WebApp.sendData('{"test":true,"msg":"sendData works!"}');
    btn.textContent = 'sendData called (app should close)';
  } catch(e) {
    btn.textContent = 'ERROR: ' + e.message;
  }
}

function testClose() {
  try {
    Telegram.WebApp.close();
  } catch(e) {
    document.getElementById('status').textContent = 'close() error: ' + e.message;
  }
}

window.onload = function() {
  showInfo();
};
</script>
</body>
</html>
